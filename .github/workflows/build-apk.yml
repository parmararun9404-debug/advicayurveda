name: Build Android APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Prepare Web Content
      run: |
        mkdir www
        # Copy web files to the www directory for Capacitor
        cp kd.html www/
        cp offline.html www/
        cp doctor.png www/
        cp logo.jpeg www/
        cp manifest.json www/
        cp service-worker.js www/
        
    - name: Install Capacitor Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
    - name: Build Android App with Capacitor
      run: |
        npx cap add android
        npx cap sync android
        
    - name: Build Android APK (Debug)
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK to existing v1.0.0 Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload v1.0.0 ./android/app/build/outputs/apk/debug/app-debug.apk --clobber --repo ${{ github.repository }}
